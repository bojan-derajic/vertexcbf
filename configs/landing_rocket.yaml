system:
  name: LandingRocket
  x_min: [-6.0, 0.0, -3.0, -6.0, -1.0, -3.0, 0.6]
  x_max: [ 6.0, 10.0, 3.0, 3.0, 1.0, 3.0, 1.0]
  u_min: [0.0, -1.0]
  u_max: [15.0, 1.0]
  params:
    gravity: 9.81
    inertia: 0.25
    alpha: 0.01

constraint:
  type: landing_funnel_sdf
  params:
    px_pad: 0.5
    slope: 0.5
    vel_weight: 0.02
    theta_weight: 0.1
    eps: 0.0001
    px_idx: 0
    pz_idx: 1
    vx_idx: 2
    vz_idx: 3
    theta_idx: 4

data:
  enabled: true
  sampling: random
  num_samples: 600000
  method: stochastic_beam_search
  method_params:
    strategy: gumbel_topk
    temperature: 0.2
  # method: mppi
  B: 1500
  K: 40
  dt: 0.1
  # method_params:
  #   sigma: [5.25, 0.35]
  #   lam: 0.0
  #   n_iter: 5

pde:
  sampling: random
  num_samples: 800000

model:
  layers:
    - [7, null]
    - [84, "sin"]
    - [84, "sin"]
    - [84, "sin"]
    - [84, "sin"]
    - [1, ["softplus", {beta: 10.0}]]
  rescale_inputs: true

training:
  epochs: 10000
  lr: 0.001
  lr_milestones: [8000]
  lr_gamma: 0.1
  pde_weight_mode: fixed
  pde_weight: 0.2

validation:
  enabled: true
  T: 5.0
  dt: 0.005
  sampling: stratified
  num_per_stratum: 500000

output:
  checkpoint_every: 1000
  log_every: 20
