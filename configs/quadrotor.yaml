system:
  name: Quadrotor
  x_min: [-3, -3, -3, -1, -1, -1, -1, -5, -5, -5, -5, -5, -5]
  x_max: [ 3,  3,  3,  1,  1,  1,  1,  5,  5,  5,  5,  5,  5]
  u_min: [ 0.0, -8.0, -8.0, -4.0]
  u_max: [20.0,  8.0,  8.0,  4.0]
  params:
    mass: 1.0
    CT: 1.0
    gravity: 9.81

constraint:
  type: cylinder_sdf
  params:
    center: [0.0, 0.0, 0.0]
    direction: [0.0, 0.0, 1.0]
    radius: 0.67

data:
  enabled: true
  sampling: random
  num_samples: 1000000
  method: branch_and_bound
  method_params:
    n_restarts: 2
  # method: mppi
  B: 150
  K: 30
  dt: 0.1
  # method_params:
  #   sigma: [7.0, 2.8, 2.8, 1.4]
  #   lam: 0.0
  #   n_iter: 5

pde:
  sampling: random
  num_samples: 2000000

model:
  layers:
    - [13, null]
    - [128, "sin"]
    - [128, "sin"]
    - [128, "sin"]
    - [128, "sin"]
    - [1, ["softplus", {beta: 10.0}]]
  rescale_inputs: true

training:
  epochs: 10000
  lr: 0.001
  lr_milestones: [9000]
  lr_gamma: 0.1
  pde_weight_mode: fixed
  pde_weight: 0.15


validation:
  enabled: true
  T: 4.0
  dt: 0.01
  sampling: stratified
  num_per_stratum: 1000000

output:
  checkpoint_every: 1000
  log_every: 20
