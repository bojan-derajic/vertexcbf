system:
  name: KinematicBicycle
  x_min: [-25.0, -25.0, -3.14, 0.0]
  x_max: [ 25.0,  25.0,  3.14,  20.0]
  u_min: [-0.3, -3.0]
  u_max: [ 0.3,  3.0]
  params:
    L: 2.8

constraint:
  type: circle_sdf
  params:
    center: [0.0, 0.0]
    radius: 7.0

data:
  enabled: true
  sampling: random
  num_samples: 200000
  method: beam_search
  # method: mppi
  B: 1000
  K: 80
  dt: 0.1
  # method_params:
  #   sigma: [0.105, 1.05]
  #   lam: 0.0
  #   n_iter: 5

pde:
  sampling: random
  num_samples: 500000
model:
  layers:
    - [4, null]
    - [32, "sin"]
    - [32, "sin"]
    - [32, "sin"]
    - [32, "sin"]
    - [1, ["softplus", {beta: 10.0}]]
  rescale_inputs: true

training:
  epochs: 10000
  lr: 0.001
  lr_milestones: [7000]
  lr_gamma: 0.1
  pde_weight_mode: fixed
  pde_weight: 0.1

validation:
  enabled: true
  T: 5.0
  dt: 0.01
  sampling: stratified
  num_per_stratum: 250000

output:
  checkpoint_every: 1000
  log_every: 20
