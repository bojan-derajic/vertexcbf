system:
  name: DubinsCar
  x_min: [-4.0, -4.0, -3.14]
  x_max: [ 4.0,  4.0,  3.14]
  u_min: [-0.5]
  u_max: [ 0.5]
  params:
    v: 1.0

constraint:
  type: circle_sdf
  params:
    center: [0.0, 0.0]
    radius: 1.0

data:
  enabled: true
  sampling: random
  num_samples: 50000
  method: beam_search
  method_params: {}
  # method: mppi
  B: 1000
  K: 150
  dt: 0.05
  # method_params:
  #   sigma: 0.175
  #   lam: 0.0
  #   n_iter: 5

pde:
  sampling: random
  num_samples: 200000

model:
  layers:
    - [3, null]
    - [32, "sin"]
    - [32, "sin"]
    - [32, "sin"]
    - [32, "sin"]
    - [1, ["softplus", {beta: 10.0}]]
  rescale_inputs: true

training:
  epochs: 10000
  lr: 0.001
  lr_milestones: [8000]
  lr_gamma: 0.1
  pde_weight_mode: fixed
  pde_weight: 0.8
  # pde_weight_milestones: [[5000, 0.9], [8000, 1.0]]

validation:
  enabled: true
  T: 5.0
  dt: 0.01
  sampling: stratified
  num_per_stratum: 100000

output:
  checkpoint_every: 1000
  log_every: 20
