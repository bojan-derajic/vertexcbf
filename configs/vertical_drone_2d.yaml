system:
  name: VerticalDrone2D
  x_min: [-0.5, -4.0]
  x_max: [3.5, 4.0]
  u_min: [-1.0]
  u_max: [1.0]
  params:
    K: 12.0
    gravity: 9.81

constraint:
  type: interval_sdf
  params:
    center: 1.5
    d: 1.5

data:
  enabled: true
  sampling: grid
  grid_shape: [80, 80]
  method: branch_and_bound
  method_params:
    n_restarts: 2
  # method: mppi
  B: 2000
  K: 60
  dt: 0.05
  # method_params:
  #   sigma: 0.35
  #   lam: 0.0
  #   n_iter: 5

pde:
  sampling: grid
  grid_shape: [100, 100]

model:
  layers:
    - [2, null]
    - [32, "sin"]
    - [32, "sin"]
    - [32, "sin"]
    - [32, "sin"]
    - [1, ["softplus", {beta: 10.0}]]
  rescale_inputs: true

training:
  epochs: 10000
  lr: 0.001
  lr_milestones: [7000]
  lr_gamma: 0.1
  pde_weight_mode: fixed
  pde_weight: 0.7

validation:
  enabled: true
  T: 5.0
  dt: 0.01
  sampling: stratified
  num_per_stratum: 10000

output:
  checkpoint_every: 1000
  log_every: 20
