system:
  name: InvertedPendulum
  x_min: [-0.5, -1.5]
  x_max: [ 0.5,  1.5]
  u_min: [-3.5]
  u_max: [ 3.5]
  params:
    m: 2.0
    l: 1.0
    gravity: 9.81

constraint:
  type: interval_sdf
  params:
    center: 0.0
    d: 0.3

data:
  enabled: true
  sampling: grid
  grid_shape: [60, 60]
  method: beam_search
  method_params: {}
  # method: mppi
  B: 500
  K: 20
  dt: 0.1
  # method_params:
  #   sigma: 1.225
  #   lam: 0.0
  #   n_iter: 5

pde:
  sampling: grid
  grid_shape: [100, 100]

model:
  layers:
    - [2, null]
    - [32, "sin"]
    - [32, "sin"]
    - [32, "sin"]
    - [32, "sin"]
    - [32, "sin"]
    - [1, ["softplus", {beta: 10.0}]]
  rescale_inputs: true

training:
  epochs: 10000
  lr: 0.001
  lr_milestones: [7000]
  lr_gamma: 0.1
  pde_weight_mode: normalized  # fixed | normalized | scheduled
  # pde_weight: 0.2
  # pde_weight_milestones: [[5000, 0.9], [8000, 1.0]]

validation:
  enabled: true
  T: 5.0
  dt: 0.01
  sampling: stratified
  num_per_stratum: 10000

output:
  checkpoint_every: 1000
  log_every: 20
